<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تطبيق الرسم الذكي باليد</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #111; /* لون الخلفية الداكن */
      font-family: sans-serif;
    }
    video { display: none; }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      transform: scaleX(-1); /* عكس الشاشة لتعمل كمرآة */
      background: transparent;
    }
    /* مؤشر الحالة أعلى الشاشة */
    #status {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      font-size: 18px;
      color: white;
      background: rgba(0,0,0,0.5);
      border-radius: 8px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div id="status">الوضع: جاري التحميل...</div>
  <video id="input_video" autoplay playsinline></video>
  <canvas id="output_canvas"></canvas>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusDiv = document.getElementById('status');
    
    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;

    // ذاكرة لحفظ الخطوط المرسومة
    let strokes = [];
    let currentStroke = null;
    
    // متغيرات لتحريك الشاشة (Pan)
    let panX = 0;
    let panY = 0;
    let lastPinch = null;

    // دالة لحساب المسافة بين نقطتين
    function getDistance(p1, p2) {
      return Math.hypot(p1.x - p2.x, p1.y - p2.y);
    }

    function onResults(results) {
      // 1. مسح الشاشة بالكامل في كل لقطة استعداداً لإعادة الرسم
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      let mode = 'توقف';

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        
        // تحديد النقاط الأساسية للأصابع (الطرف والمفصل الذي يليه)
        const thumbTip = landmarks[4];
        const indexTip = landmarks[8], indexPip = landmarks[6];
        const middleTip = landmarks[12], middlePip = landmarks[10];
        const ringTip = landmarks[16], ringPip = landmarks[14];
        const pinkyTip = landmarks[20], pinkyPip = landmarks[18];

        // التحقق من حالة كل إصبع (هل الطرف أعلى من المفصل؟ تذكر أن الإحداثي y يبدأ من الأعلى)
        const isIndexUp = indexTip.y < indexPip.y;
        const isMiddleUp = middleTip.y < middlePip.y;
        const isRingUp = ringTip.y < ringPip.y;
        const isPinkyUp = pinkyTip.y < pinkyPip.y;

        // التحقق من "القرصة" أو الإمساك (المسافة بين الإبهام والسبابة)
        const pinchDist = getDistance(thumbTip, indexTip);
        const isPinching = pinchDist < 0.05; // 0.05 هي مسافة صغيرة جداً تعني تلامس الأصابع

        // 2. تحديد الوضع (Mode) بناءً على الإيماءات
        if (isPinching) {
          mode = 'تحريك';
        } else if (isIndexUp && !isMiddleUp && !isRingUp && !isPinkyUp) {
          mode = 'رسم';
        } else if (isIndexUp && isMiddleUp && !isRingUp && !isPinkyUp) {
          mode = 'مسح';
        } else {
          mode = 'توقف';
        }

        // 3. تنفيذ الإجراء بناءً على الوضع
        const currentX = indexTip.x * canvasElement.width;
        const currentY = indexTip.y * canvasElement.height;

        if (mode === 'رسم' || mode === 'مسح') {
          // إذا بدأنا خطاً جديداً أو تغير الوضع
          if (!currentStroke || currentStroke.mode !== mode) {
            currentStroke = { mode: mode, points: [] };
            strokes.push(currentStroke);
          }
          // نحفظ النقطة الحالية مخصوماً منها مسافة التحريك، لتبقى في مكانها الصحيح في الذاكرة
          currentStroke.points.push({ x: currentX - panX, y: currentY - panY });
          lastPinch = null; // تصفير متغير التحريك
        } 
        else if (mode === 'تحريك') {
          currentStroke = null;
          // حساب نقطة المنتصف بين الإبهام والسبابة
          const pinchX = ((thumbTip.x + indexTip.x) / 2) * canvasElement.width;
          const pinchY = ((thumbTip.y + indexTip.y) / 2) * canvasElement.height;

          if (lastPinch) {
            panX += (pinchX - lastPinch.x);
            panY += (pinchY - lastPinch.y);
          }
          lastPinch = { x: pinchX, y: pinchY };
        } 
        else {
          // وضع التوقف
          currentStroke = null;
          lastPinch = null;
        }
      }

      // تحديث واجهة المستخدم
      statusDiv.innerText = `الوضع: ${mode}`;

      // 4. إعادة رسم كل شيء من الذاكرة (Strokes)
      canvasCtx.save();
      canvasCtx.translate(panX, panY); // تحريك مساحة الرسم بالكامل

      for (const stroke of strokes) {
        if (stroke.points.length === 0) continue;

        canvasCtx.beginPath();
        canvasCtx.moveTo(stroke.points[0].x, stroke.points[0].y);
        for (let i = 1; i < stroke.points.length; i++) {
          canvasCtx.lineTo(stroke.points[i].x, stroke.points[i].y);
        }

        if (stroke.mode === 'رسم') {
          canvasCtx.globalCompositeOperation = 'source-over';
          canvasCtx.strokeStyle = '#00FFFF';
          canvasCtx.lineWidth = 6;
          canvasCtx.lineCap = 'round';
          canvasCtx.lineJoin = 'round';
          canvasCtx.shadowBlur = 15;
          canvasCtx.shadowColor = '#00FFFF';
        } else if (stroke.mode === 'مسح') {
          // هذه الخاصية تقوم بمسح ما تحتها بدلاً من الرسم فوقه
          canvasCtx.globalCompositeOperation = 'destination-out';
          canvasCtx.strokeStyle = 'rgba(0,0,0,1)';
          canvasCtx.lineWidth = 40; // مساحة المسح أوسع من القلم
          canvasCtx.lineCap = 'round';
          canvasCtx.lineJoin = 'round';
          canvasCtx.shadowBlur = 0;
        }
        canvasCtx.stroke();
      }
      canvasCtx.restore();
    }

    // إعداد مكتبة MediaPipe
    const hands = new Hands({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});
    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });
    hands.onResults(onResults);

    // تشغيل الكاميرا
    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({image: videoElement});
      },
      width: window.innerWidth,
      height: window.innerHeight,
      facingMode: 'user'
    });
    camera.start();
  </script>
</body>
</html>
